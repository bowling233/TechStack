# Project information
site_name: Bowling's TechStack
site_url: https://note.bowling233.top
repo_url: https://github.com/bowling233/TechStack
repo_name: TechStack
edit_uri: blob/master/docs/
site_description: Bowling 的笔记本
site_author: Bowling
copyright: <a href="https://beian.miit.gov.cn/" target="_blank">浙ICP备2022036274号-1</a>

# Material
markdown_extensions:
  # Admonition
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
  # Mermaid
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  # Code Block
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  # Tab
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  # Grid, Image
  - attr_list
  - md_in_html
  # Icon
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg 
  # List
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true
  # TOC
  - toc:
      permalink: true
      # toc_depth: 3
  # MathJax
  - pymdownx.arithmatex:
      generic: true
  # Keys
  - pymdownx.keys
  # Not Standard
  - neoteroi.cards

extra:
  social:
    - icon: material/home-circle
      link: https://bowling233.com
extra_javascript:
  # MathJax
  - javascripts/mathjax.js
  - https://polyfill.alicdn.com/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
  # Table Sort
  - https://unpkg.com/tablesort@5.3.0/dist/tablesort.min.js
  - javascripts/tablesort.js
extra_css:
  - stylesheets/extra.css
  - stylesheets/flink.css
  - stylesheets/neoteroi-mkdocs.css
  - stylesheets/custom.css
  - https://cdn.tonycrane.cc/lxgw/lxgwscreen.css
  - https://cdn.tonycrane.cc/jbmono/jetbrainsmono.css

# Build directories
theme:
  name: material
  logo: https://cdn.bowling233.top/note/avatar/bowling.svg
  favicon: https://cdn.bowling233.top/note/avatar/bowling.svg
  features:
    - search.highlight
    - navigation.tracking
    - navigation.tabs
    - navigation.prune
    - navigation.indexes
    - header.autohide
    - content.code.copy
    - content.code.annotate
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

# Plugins
plugins:
  - tags:
      tags_file: index.md
  - search
  - glightbox
  - git-revision-date-localized